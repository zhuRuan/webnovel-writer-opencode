# 审查器注册表
# 新增审查器只需编辑此文件，无需修改 SKILL.md

# 审查器列表
checkers:
  unified-reviewer:
    name: 统一审查器
    name_en: Unified Reviewer
    file: ../agents/unified-reviewer.md
    category: core
    enabled: true
    description: 单Agent覆盖设定一致性/连贯性/OOC/追读力/爽点密度/节奏6维度
    triggers: []
    invoke_template: |
      对第 {chapter} 章执行全面审查。
      - 章节文件：{chapter_file}
      - 项目根：{PROJECT_ROOT}
      - 审查器定义见：.opencode/agents/unified-reviewer.md

  consistency-checker:
    name: 设定一致性检查
    name_en: Consistency Checker
    file: ../agents/consistency-checker.md
    category: core
    enabled: true
    description: 战力/地点/时间线/实体一致性检查
    triggers: []
    invoke_template: |
      对第 {chapter} 章执行设定一致性审查。
      - 章节文件：{chapter_file}
      - 项目根：{PROJECT_ROOT}
      - 审查器定义见：.opencode/agents/consistency-checker.md
    
  continuity-checker:
    name: 连贯性检查
    name_en: Continuity Checker
    file: ../agents/continuity-checker.md
    category: core
    enabled: true
    description: 场景过渡、伏笔管理、逻辑连贯性
    triggers: []
    invoke_template: |
      对第 {chapter} 章执行连贯性审查。
      - 章节文件：{chapter_file}
      - 项目根：{PROJECT_ROOT}
      - 审查器定义见：.opencode/agents/continuity-checker.md
    
  ooc-checker:
    name: 人物OOC检查
    name_en: OOC Checker
    file: ../agents/ooc-checker.md
    category: core
    enabled: true
    description: 防止角色行为与人设冲突
    triggers: []
    invoke_template: |
      对第 {chapter} 章执行人物OOC审查。
      - 章节文件：{chapter_file}
      - 项目根：{PROJECT_ROOT}
      - 审查器定义见：.opencode/agents/ooc-checker.md
    
  reader-pull-checker:
    name: 追读力检查
    name_en: Reader Pull Checker
    file: ../agents/reader-pull-checker.md
    category: conditional
    enabled: true
    description: 评估钩子/微兑现/约束分层
    triggers:
      - type: condition
        expression: "chapter_type != 'transitional'"
      - type: keyword
        keywords: ["悬念", "危机", "承诺", "期待"]
        min_count: 1
    invoke_template: |
      对第 {chapter} 章执行追读力审查。
      - 章节文件：{chapter_file}
      - 项目根：{PROJECT_ROOT}
      - 审查器定义见：.opencode/agents/reader-pull-checker.md
      
  high-point-checker:
    name: 爽点密度检查
    name_en: High Point Checker
    file: ../agents/high-point-checker.md
    category: conditional
    enabled: true
    description: 爽点密度与质量，支持迪化误解/身份掉马模式
    triggers:
      - type: keyword
        keywords: ["战斗", "反杀", "打脸", "身份揭露", "大反转", "突破"]
        min_count: 1
    invoke_template: |
      对第 {chapter} 章执行爽点密度审查。
      - 章节文件：{chapter_file}
      - 项目根：{PROJECT_ROOT}
      - 审查器定义见：.opencode/agents/high-point-checker.md
      
  pacing-checker:
    name: 节奏检查
    name_en: Pacing Checker
    file: ../agents/pacing-checker.md
    category: conditional
    enabled: true
    description: Strand Weave 节奏检查，防止读者疲劳
    triggers:
      - type: condition
        expression: "chapter_number >= 10"
      - type: condition
        expression: "has_pacing_risk == True"
    invoke_template: |
      对第 {chapter} 章执行节奏审查。
      - 章节文件：{chapter_file}
      - 项目根：{PROJECT_ROOT}
      - 审查器定义见：.opencode/agents/pacing-checker.md

# 审查模式配置
modes:
  unified_review:
    description: 统一审查模式（默认，单Agent覆盖6维度）
    include_categories: [core]
    selected_checkers: [unified-reviewer]
  standard:
    description: 精细审查模式（6个独立Agent）
    include_categories: [core, conditional]
    exclude_checkers: [unified-reviewer]
  minimal:
    description: 最小模式（统一审查）
    include_categories: [core]
    selected_checkers: [unified-reviewer]
  full:
    description: 完整模式（6独立Agent全部强制）
    include_categories: [core, conditional]
    force_conditional: true
    exclude_checkers: [unified-reviewer]

# 审查器维度映射（用于 dimension_scores 计算）
dimension_mapping:
  设定一致性: [consistency-checker, unified-reviewer]
  连贯性: [continuity-checker, unified-reviewer]
  人物塑造: [ooc-checker, unified-reviewer]
  追读力: [reader-pull-checker, unified-reviewer]
  爽点密度: [high-point-checker, unified-reviewer]
  节奏控制: [pacing-checker, unified-reviewer]

# 时间线闸门配置
timeline_gate:
  hard_block:
    - TIMELINE_ISSUE + critical  # 倒计时算术错误
    - TIMELINE_ISSUE + high      # 事件矛盾/时间回跳/大跨度无过渡
  soft_warning:
    - TIMELINE_ISSUE + medium    # 时间锚点缺失
    - TIMELINE_ISSUE + low       # 轻微时间模糊
