# 审查器注册表
# 新增审查器只需编辑此文件，无需修改 SKILL.md

# 审查器列表
checkers:
  consistency-checker:
    name: 设定一致性检查
    name_en: Consistency Checker
    file: ../agents/consistency-checker.md
    category: core          # core | conditional
    enabled: true
    description: 战力/地点/时间线/实体一致性检查
    triggers: []            # core 类型无需 triggers
    invoke_template: |
      对第 {chapter} 章执行设定一致性审查。
      - 章节文件：{chapter_file}
      - 项目根：{PROJECT_ROOT}
      - 审查器定义见：.opencode/agents/consistency-checker.md
    
  continuity-checker:
    name: 连贯性检查
    name_en: Continuity Checker
    file: ../agents/continuity-checker.md
    category: core
    enabled: true
    description: 场景过渡、伏笔管理、逻辑连贯性
    triggers: []
    invoke_template: |
      对第 {chapter} 章执行连贯性审查。
      - 章节文件：{chapter_file}
      - 项目根：{PROJECT_ROOT}
      - 审查器定义见：.opencode/agents/continuity-checker.md
    
  ooc-checker:
    name: 人物OOC检查
    name_en: OOC Checker
    file: ../agents/ooc-checker.md
    category: core
    enabled: true
    description: 防止角色行为与人设冲突
    triggers: []
    invoke_template: |
      对第 {chapter} 章执行人物OOC审查。
      - 章节文件：{chapter_file}
      - 项目根：{PROJECT_ROOT}
      - 审查器定义见：.opencode/agents/ooc-checker.md
    
  reader-pull-checker:
    name: 追读力检查
    name_en: Reader Pull Checker
    file: ../agents/reader-pull-checker.md
    category: conditional
    enabled: true
    description: 评估钩子/微兑现/约束分层
    triggers:
      - type: condition
        expression: "chapter_type != 'transitional'"
      - type: keyword
        keywords: ["悬念", "危机", "承诺", "期待"]
        min_count: 1
    invoke_template: |
      对第 {chapter} 章执行追读力审查。
      - 章节文件：{chapter_file}
      - 项目根：{PROJECT_ROOT}
      - 审查器定义见：.opencode/agents/reader-pull-checker.md
      
  high-point-checker:
    name: 爽点密度检查
    name_en: High Point Checker
    file: ../agents/high-point-checker.md
    category: conditional
    enabled: true
    description: 爽点密度与质量，支持迪化误解/身份掉马模式
    triggers:
      - type: keyword
        keywords: ["战斗", "反杀", "打脸", "身份揭露", "大反转", "突破"]
        min_count: 1
    invoke_template: |
      对第 {chapter} 章执行爽点密度审查。
      - 章节文件：{chapter_file}
      - 项目根：{PROJECT_ROOT}
      - 审查器定义见：.opencode/agents/high-point-checker.md
      
  pacing-checker:
    name: 节奏检查
    name_en: Pacing Checker
    file: ../agents/pacing-checker.md
    category: conditional
    enabled: true
    description: Strand Weave 节奏检查，防止读者疲劳
    triggers:
      - type: condition
        expression: "chapter_number >= 10"
      - type: condition
        expression: "has_pacing_risk == True"
    invoke_template: |
      对第 {chapter} 章执行节奏审查。
      - 章节文件：{chapter_file}
      - 项目根：{PROJECT_ROOT}
      - 审查器定义见：.opencode/agents/pacing-checker.md

  world-consistency-checker:
    name: 世界观一致性检查
    name_en: World Consistency Checker
    file: ../agents/world-consistency-checker.md
    category: conditional
    enabled: true
    description: 检测战力崩坏、道具复用、势力平衡、时间线矛盾
    triggers:
      - type: condition
        expression: "chapter_number >= 5 and chapter_number % 10 == 0"
      - type: condition
        expression: "chapter_type == 'climax'"
    invoke_template: |
      对第 {chapter} 章执行世界观一致性检查。
      - 章节文件：{chapter_file}
      - 项目根：{PROJECT_ROOT}
      - 审查器定义见：.opencode/agents/world-consistency-checker.md

# 审查模式配置
modes:
  standard:
    description: 标准模式（auto 路由，核心 + 条件命中）
    include_categories: [core, conditional]
  minimal:
    description: 最小模式（只跑核心审查器）
    include_categories: [core]
  full:
    description: 完整模式（强制启用所有审查器）
    include_categories: [core, conditional]
    force_conditional: true

# 审查器维度映射（用于 dimension_scores 计算）
dimension_mapping:
  爽点密度: [high-point-checker]
  设定一致性: [consistency-checker]
  节奏控制: [pacing-checker]
  人物塑造: [ooc-checker]
  连贯性: [continuity-checker]
  追读力: [reader-pull-checker]

# 时间线闸门配置
timeline_gate:
  hard_block:
    - TIMELINE_ISSUE + critical  # 倒计时算术错误
    - TIMELINE_ISSUE + high      # 事件矛盾/时间回跳/大跨度无过渡
  soft_warning:
    - TIMELINE_ISSUE + medium    # 时间锚点缺失
    - TIMELINE_ISSUE + low       # 轻微时间模糊
