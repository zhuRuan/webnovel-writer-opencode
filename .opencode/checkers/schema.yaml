# 审查器输出统一 Schema
# 替代原来的 checker-output-schema.md

# 基础 Schema（所有审查器必须返回）
base_schema:
  version: "1.0"
  
  required_fields:
    agent: string          # 审查器 ID
    chapter: integer       # 章节号
    overall_score: number  # 总分 0-100
    pass: boolean         # 是否通过
    issues: array         # 问题列表
    metrics: object       # 审查器特定指标
    summary: string       # 简短总结
    
  optional_fields:
    hard_violations: array   # 严重违规列表
    soft_suggestions: array  # 软建议列表
    override_eligible: boolean  # 是否允许覆盖

# 问题 Schema
issue_schema:
  required_fields:
    id: string           # 问题 ID，如 ISSUE_001
    type: string         # 问题类型，如 POWER_CONFLICT
    severity: enum       # critical|high|medium|low
    description: string   # 问题描述
    
  optional_fields:
    location: string     # 位置描述
    suggestion: string   # 修复建议
    can_override: boolean
    chapter: integer     # 问题所在章节

# 严重度定义
severity_levels:
  critical:
    description: 严重问题，必须修复
    action: 润色步骤必须修复
    color: red
  high:
    description: 高优先级问题
    action: 优先修复
    color: orange
  medium:
    description: 中等问题
    action: 建议修复
    color: yellow
  low:
    description: 轻微问题
    action: 可选修复
    color: green

# 各审查器 metrics 定义
metrics_definitions:
  consistency-checker:
    fields:
      power_violations:
        type: integer
        description: 战力违规数量
      location_errors:
        type: integer
        description: 地点错误数量
      timeline_issues:
        type: integer
        description: 时间线问题数量
      entity_conflicts:
        type: integer
        description: 实体冲突数量
        
  continuity-checker:
    fields:
      transition_grade:
        type: string
        description: 过渡评分 A|B|C|D
        enum: [A, B, C, D]
      active_threads:
        type: integer
        description: 活跃伏笔数
      dormant_threads:
        type: integer
        description: 休眠伏笔数
      forgotten_foreshadowing:
        type: integer
        description: 遗忘伏笔数
      logic_holes:
        type: integer
        description: 逻辑漏洞数
      outline_deviations:
        type: integer
        description: 大纲偏离数
        
  ooc-checker:
    fields:
      severe_ooc:
        type: integer
        description: 严重 OOC 数量
      moderate_ooc:
        type: integer
        description: 中度 OOC 数量
      minor_ooc:
        type: integer
        description: 轻微 OOC 数量
      speech_violations:
        type: integer
        description: 对话违规数
      character_development_valid:
        type: boolean
        description: 角色发展是否合理
        
  reader-pull-checker:
    fields:
      hook_present:
        type: boolean
        description: 是否有钩子
      hook_type:
        type: string
        description: 钩子类型
        enum: [悬念钩, 危机钩, 承诺钩, 情绪钩, 选择钩, 渴望钩, 无]
      hook_strength:
        type: string
        description: 钩子强度
        enum: [strong, medium, weak, 无]
      prev_hook_fulfilled:
        type: boolean
        description: 上章钩子是否兑现
      micropayoff_count:
        type: integer
        description: 微兑现数量
      micropayoffs:
        type: array
        items: string
        description: 微兑现类型列表
      is_transition:
        type: boolean
        description: 是否为过渡章
      debt_balance:
        type: number
        description: 债务余额
        
  high-point-checker:
    fields:
      cool_point_count:
        type: integer
        description: 爽点数量
      cool_point_types:
        type: array
        items: string
        description: 爽点类型列表
      density_score:
        type: number
        description: 爽点密度评分 0-10
      type_diversity:
        type: number
        description: 类型多样性 0-1
      milestone_present:
        type: boolean
        description: 是否有里程碑爽点
        
  pacing-checker:
    fields:
      dominant_strand:
        type: string
        description: 主导 Strand
        enum: [quest, fire, constellation]
      quest_ratio:
        type: number
        description: Quest 占比 0-1
      fire_ratio:
        type: number
        description: Fire 占比 0-1
      constellation_ratio:
        type: number
        description: Constellation 占比 0-1
      consecutive_quest:
        type: integer
        description: 连续 Quest 章数
      fire_gap:
        type: integer
        description: Fire 断档章数
      constellation_gap:
        type: integer
        description: Constellation 断档章数
      fatigue_risk:
        type: string
        description: 疲劳风险
        enum: [low, medium, high]

# 汇总 Schema（用于聚合多个审查器结果）
aggregation_schema:
  version: "1.0"
  
  required_fields:
    chapter: integer
    checkers: object      # 各审查器结果
    overall: object       # 总体评分
    severity_counts: object
    issues: array         # 扁平化问题列表
    dimension_scores: object
    selected_checkers: array

# 审查指标落库 Schema（用于 index.db.review_metrics）
review_metrics_schema:
  start_chapter:
    type: integer
    required: true
  end_chapter:
    type: integer
    required: true
  overall_score:
    type: number
    required: true
  dimension_scores:
    type: object
    keys:
      - 爽点密度
      - 设定一致性
      - 节奏控制
      - 人物塑造
      - 连贯性
      - 追读力
  severity_counts:
    type: object
    keys: [critical, high, medium, low]
  critical_issues:
    type: array
    items: string
  report_file:
    type: string
    description: 审查报告文件路径
  notes:
    type: string
    description: 扩展信息（selected_checkers/timeline_gate 等压成单行）
